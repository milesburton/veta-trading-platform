# supervisord configuration for Fly.io single-VM deployment.
# Starts all backend Deno services + Traefik reverse proxy + static frontend + Redpanda.
# All services communicate on localhost with fixed ports.

[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info
user=root

[program:traefik]
command=/usr/local/bin/traefik --configFile=/app/traefik-fly.yml
autostart=true
autorestart=true
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:redpanda]
command=bash -c "echo '=== redpanda startup diagnostic ==='; ls -l /usr/local/bin/rpk /usr/local/bin/redpanda || true; file /usr/local/bin/rpk || true; ldd /usr/local/bin/rpk || true; /usr/local/bin/rpk --version || echo 'rpk --version failed, exit code:'$?; mkdir -p /var/lib/redpanda/data /etc/redpanda; /usr/local/bin/rpk redpanda start --mode=dev-container --smp=1 --memory=200M --default-log-level=warn --kafka-addr=0.0.0.0:9092 --advertise-kafka-addr=localhost:9092"
environment=LD_LIBRARY_PATH="/usr/local/lib/redpanda"
autostart=true
autorestart=true
priority=2
startsecs=8
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:redpanda-console]
command=/usr/local/bin/redpanda-console
environment=KAFKA_BROKERS="localhost:9092",SERVER_LISTENPORT="8081"
autostart=true
autorestart=true
priority=5
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:market-sim]
command=deno run --allow-all /app/backend/src/market-sim/market-sim.ts
environment=MARKET_SIM_PORT="5000",REDPANDA_BROKERS="localhost:9092"
directory=/app
autostart=true
