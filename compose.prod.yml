# Production override — homelab
# Usage: docker compose -f compose.yml -f compose.prod.yml up -d

x-prod-image: &prod-defaults
  restart: unless-stopped

services:

  # Infrastructure — persistent, no Watchtower
  redpanda:
    <<: *prod-defaults
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=2
      - --memory=512M
      - --default-log-level=warn
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
    mem_limit: 768m
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"

  postgres:
    <<: *prod-defaults
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"

  # Application services — use GHCR images + Watchtower
  frontend:
    <<: *prod-defaults
    image: ghcr.io/milesburton/veta-trading-platform/frontend:latest
    build: !reset null
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend.priority=1"
      - "com.centurylinklabs.watchtower.enable=true"

  market-sim:
