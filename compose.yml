      - "traefik.http.routers.arrival-price-algo.middlewares=arrival-price-algo-strip"
      - "traefik.http.middlewares.arrival-price-algo-strip.stripprefix.prefixes=/api/arrival-price-algo"
      - "traefik.http.services.arrival-price-algo.loadbalancer.server.port=5023"
      - "traefik.http.routers.arrival-price-algo.priority=10"

  momentum-algo:
    <<: *deno-service
    profiles: [trading]
    command: [
      "deno",
      "run",
      "--allow-all",
      "/app/backend/src/algo/momentum-strategy.ts",
    ]
    depends_on:
      redpanda:
        condition: service_healthy
      ems:
        condition: service_healthy
    environment:
      MOMENTUM_ALGO_PORT: "5025"
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: "5000"
      EMS_HOST: ems
      EMS_PORT: "5001"
      OBSERVABILITY_HOST: observability
      OBSERVABILITY_PORT: "5007"
      REDPANDA_BROKERS: redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5025/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
