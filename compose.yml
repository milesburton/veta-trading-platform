      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pov-algo.rule=PathPrefix(`/api/pov-algo`)"
      - "traefik.http.routers.pov-algo.entrypoints=web,websecure"
      - "traefik.http.routers.pov-algo.middlewares=pov-algo-strip"
      - "traefik.http.middlewares.pov-algo-strip.stripprefix.prefixes=/api/pov-algo"
      - "traefik.http.services.pov-algo.loadbalancer.server.port=5005"
      - "traefik.http.routers.pov-algo.priority=10"

