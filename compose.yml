networks:
  trading-net:
    driver: bridge

volumes:
  postgres-data:
  market-data-state:
  feature-engine-data:
  signal-engine-data:
  llm-advisory-data:
  letsencrypt:

x-deno-service: &deno-service
  build:
    context: .
    dockerfile: docker/base/Dockerfile
  networks:
    - trading-net
  mem_limit: 512m

x-deno-medium: &deno-medium
  build:
    context: .
    dockerfile: docker/base/Dockerfile
  networks:
    - trading-net
  mem_limit: 768m

services:
  # ── Service profiles ─────────────────────────────────────────────────────
  # No profile (always-on): redpanda, postgres, market-sim, journal,
  #   user-service, ems, oms, gateway, frontend, db-migrate, traefik, disk-monitor
  #
  # profile=trading (idle-safe — start/stop together):
  #   algos, microstructure (dark-pool/ccp/rfq/fix-*), analytics pipeline,
  #   feature/signal/recommendation/scenario engines, llm-advisory, news-aggregator,
  #   observability (kafka-relay), ollama
  #
  # Start idle-safe services:  docker compose --profile trading up -d
  # Stop  idle-safe services:  docker compose --profile trading stop
  # Full  status:              docker compose --profile trading ps

  # ── Message Bus ───────────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.3.6
    container_name: redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --default-log-level=warn
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
    networks:
      - trading-net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    labels:
      - "traefik.enable=false"

  redpanda-init:
    image: redpandadata/redpanda:v24.3.6
    container_name: redpanda-init
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
          set -e
          TOPICS="market.ticks algo.heartbeat orders.new orders.routed orders.child orders.filled fix.execution news.feed intelligence.features intelligence.signals intelligence.recommendations"
          for TOPIC in $TOPICS; do
            rpk topic create "$TOPIC" --brokers redpanda:9092 2>/dev/null || true
          done
          rpk topic alter-config market.ticks   --set retention.bytes=524288000  --brokers redpanda:9092
          rpk topic alter-config market.ticks   --set retention.ms=3600000       --brokers redpanda:9092
          rpk topic alter-config algo.heartbeat --set retention.bytes=52428800   --brokers redpanda:9092
          rpk topic alter-config algo.heartbeat --set retention.ms=1800000       --brokers redpanda:9092
          echo "Retention limits applied"
    labels:
      - "traefik.enable=false"

  redpanda-console:
    image: redpandadata/console:v2.7.2
    networks:
      - trading-net
    mem_limit: 128m
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      SERVER_LISTENPORT: "8081"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redpanda-console.rule=PathPrefix(`/admin/redpanda`)"
      - "traefik.http.routers.redpanda-console.entrypoints=web,websecure"
      - "traefik.http.routers.redpanda-console.middlewares=redpanda-strip"
      - "traefik.http.middlewares.redpanda-strip.stripprefix.prefixes=/admin/redpanda"
      - "traefik.http.services.redpanda-console.loadbalancer.server.port=8081"
      - "traefik.http.routers.redpanda-console.priority=15"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    networks:
      - trading-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veta}
      POSTGRES_DB: ${POSTGRES_DB:-veta}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
    mem_limit: 384m
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-veta}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    labels:
      - "traefik.enable=false"

  db-migrate:
    build:
      context: .
      dockerfile: docker/db-migrate/Dockerfile
    networks:
      - trading-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-veta}:${POSTGRES_PASSWORD:-veta}@postgres:5432/${POSTGRES_DB:-veta}
    restart: "no"
    labels:
      - "traefik.enable=false"

  # ── Traefik ────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    networks:
      - trading-net
    mem_limit: 128m
    ports:
      - "80:80"
      - "443:443"
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - letsencrypt:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=PathPrefix(`/admin/traefik`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web,websecure"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-strip"
      - "traefik.http.middlewares.traefik-strip.stripprefix.prefixes=/admin/traefik"

  # ── Ollama (local LLM) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    profiles: [trading]
    networks:
      - trading-net
    volumes:
      - llm-advisory-data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 5m
    mem_limit: 3g
    healthcheck:
      test: [
        "CMD-SHELL",
        "wget -qO- http://localhost:11434/api/tags > /dev/null 2>&1 || exit 1",
      ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    labels:
      - "traefik.enable=false"

  ollama-model-pull:
    image: ollama/ollama:latest
    profiles: [trading]
    networks:
      - trading-net
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - llm-advisory-data:/root/.ollama
    entrypoint: ["ollama", "pull", "qwen2.5:3b"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"
    labels:
      - "traefik.enable=false"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_DEPLOYMENT: ${VITE_DEPLOYMENT:-homelab}
        VITE_BUILD_DATE: ${BUILD_DATE:-dev}
    mem_limit: 128m
    networks:
      - trading-net
    environment:
      FRONTEND_PORT: "3000"
    healthcheck:
      disable: true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web,websecure"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend.priority=1"

  # ── Market Sim ─────────────────────────────────────────────────────────────
  market-sim:
    <<: *deno-medium
    command: [
      "deno",
      "run",
      "--allow-all",
      "/app/backend/src/market-sim/market-sim.ts",
    ]
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      MARKET_SIM_PORT: "5000"
      REDPANDA_BROKERS: redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.market-sim.rule=PathPrefix(`/api/market-sim`) || PathPrefix(`/ws/market-sim`)"
      - "traefik.http.routers.market-sim.entrypoints=web,websecure"
      - "traefik.http.routers.market-sim.middlewares=market-sim-strip"
      - "traefik.http.middlewares.market-sim-strip.stripprefix.prefixes=/api/market-sim,/ws/market-sim"
      - "traefik.http.services.market-sim.loadbalancer.server.port=5000"
      - "traefik.http.routers.market-sim.priority=10"

  # ── EMS ────────────────────────────────────────────────────────────────────
  ems:
    <<: *deno-medium
    command: [
      "deno",
      "run",
      "--allow-all",
      "/app/backend/src/ems/ems-server.ts",
    ]
    depends_on:
      redpanda:
        condition: service_healthy
      market-sim:
        condition: service_healthy
    environment:
      EMS_PORT: "5001"
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: "5000"
      EMS_PARTICIPATION_CAP: "0.20"
      EMS_IMPACT_PER_1000_BPS: "1.0"
      REDPANDA_BROKERS: redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ems.rule=PathPrefix(`/api/ems`)"
      - "traefik.http.routers.ems.entrypoints=web,websecure"
      - "traefik.http.routers.ems.middlewares=ems-strip"
      - "traefik.http.middlewares.ems-strip.stripprefix.prefixes=/api/ems"
      - "traefik.http.services.ems.loadbalancer.server.port=5001"
      - "traefik.http.routers.ems.priority=10"

  # ── OMS ────────────────────────────────────────────────────────────────────
  oms:
    <<: *deno-medium
    command: [
      "deno",
      "run",
      "--allow-all",
      "/app/backend/src/oms/oms-server.ts",
    ]
    depends_on:
      redpanda:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      OMS_PORT: "5002"
      ALGO_HOST: limit-algo
      ALGO_TRADER_PORT: "5003"
      TWAP_ALGO_PORT: "5004"
      POV_ALGO_PORT: "5005"
      VWAP_ALGO_PORT: "5006"
      ICEBERG_ALGO_PORT: "5021"
      SNIPER_ALGO_PORT: "5022"
      ARRIVAL_PRICE_ALGO_PORT: "5023"
      MOMENTUM_ALGO_PORT: "5025"
      IS_ALGO_PORT: "5026"
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: "5008"
      REDPANDA_BROKERS: redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oms.rule=PathPrefix(`/api/oms`)"
      - "traefik.http.routers.oms.entrypoints=web,websecure"
      - "traefik.http.routers.oms.middlewares=oms-strip"
      - "traefik.http.middlewares.oms-strip.stripprefix.prefixes=/api/oms"
      - "traefik.http.services.oms.loadbalancer.server.port=5002"
      - "traefik.http.routers.oms.priority=10"

  # ── Algo strategies ────────────────────────────────────────────────────────
  limit-algo:
    <<: *deno-service
    profiles: [trading]
    command: [
      "deno",
      "run",
      "--allow-all",
      "/app/backend/src/algo/limit-strategy.ts",
    ]
    depends_on:
      redpanda:
        condition: service_healthy
      ems:
        condition: service_healthy
    environment:
      ALGO_TRADER_PORT: "5003"
      EMS_HOST: ems
      EMS_PORT: "5001"
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: "5000"
      OBSERVABILITY_HOST: observability
      OBSERVABILITY_PORT: "5007"
      REDPANDA_BROKERS: redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.limit-algo.rule=PathPrefix(`/api/limit-algo`)"
      - "traefik.http.routers.limit-algo.entrypoints=web,websecure"
      - "traefik.http.routers.limit-algo.middlewares=limit-algo-strip"
      - "traefik.http.middlewares.limit-algo-strip.stripprefix.prefixes=/api/limit-algo"
      - "traefik.http.services.limit-algo.loadbalancer.server.port=5003"
      - "traefik.http.routers.limit-algo.priority=10"

  twap-algo:
    <<: *deno-service
    profiles: [trading]
    command: [
      "deno",
      "run",
      "--allow-all",
      "/app/backend/src/algo/twap-strategy.ts",
