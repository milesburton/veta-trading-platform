    profiles: [trading]
    command: [
      "deno",
      "run",
      "--allow-all",
      "/app/backend/src/algo/sniper-strategy.ts",
    ]
    depends_on:
      redpanda:
        condition: service_healthy
      ems:
        condition: service_healthy
    environment:
      SNIPER_ALGO_PORT: "5022"
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: "5000"
      EMS_HOST: ems
      EMS_PORT: "5001"
      OBSERVABILITY_HOST: observability
