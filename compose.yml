      "/app/backend/src/news/news-aggregator.ts",
    ]
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      REDPANDA_BROKERS: redpanda:9092
    labels:
      - "traefik.enable=false"

  # ── LLM Advisory ──────────────────────────────────────────────────────────
  llm-advisory:
    <<: *deno-medium
    profiles: [trading]
    command: [
      "deno",
      "run",
      "--allow-all",
      "/app/backend/src/llm-advisory/orchestrator.ts",
    ]
    depends_on:
      redpanda:
        condition: service_healthy
      ollama:
        condition: service_healthy
      feature-engine:
        condition: service_healthy
      signal-engine:
        condition: service_healthy
    environment:
      LLM_ADVISORY_PORT: "5024"
      LLM_ADVISORY_DB_PATH: /app/data/llm-advisory.db
      LLM_ENABLED: "true"
      LLM_WORKER_ENABLED: "true"
      LLM_PROVIDER: ollama
      LLM_MODEL_ID: qwen2.5:3b
      LLM_OLLAMA_BASE_URL: http://ollama:11434
      LLM_TRIGGER_MODE: on-demand-ui
      FEATURE_ENGINE_URL: http://feature-engine:5017
      SIGNAL_ENGINE_URL: http://signal-engine:5018
      REDPANDA_BROKERS: redpanda:9092
      DATABASE_URL: postgres://${POSTGRES_USER:-veta}:${POSTGRES_PASSWORD:-veta}@postgres:5432/${POSTGRES_DB:-veta}
    volumes:
      - llm-advisory-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5024/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.llm-advisory.rule=PathPrefix(`/api/llm-advisory`)"
      - "traefik.http.routers.llm-advisory.entrypoints=web,websecure"
      - "traefik.http.routers.llm-advisory.middlewares=llm-advisory-strip"
      - "traefik.http.middlewares.llm-advisory-strip.stripprefix.prefixes=/api/llm-advisory"
      - "traefik.http.services.llm-advisory.loadbalancer.server.port=5024"
      - "traefik.http.routers.llm-advisory.priority=10"

  llm-worker:
    <<: *deno-medium
    profiles: [trading]
    command: [
      "deno",
      "run",
      "--allow-all",
      "/app/backend/src/llm-advisory/worker.ts",
    ]
    depends_on:
      llm-advisory:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      LLM_ADVISORY_DB_PATH: /app/data/llm-advisory.db
      LLM_ENABLED: "true"
      LLM_WORKER_ENABLED: "true"
      LLM_PROVIDER: ollama
      LLM_MODEL_ID: qwen2.5:3b
      LLM_OLLAMA_BASE_URL: http://ollama:11434
      LLM_TRIGGER_MODE: on-demand-ui
      FEATURE_ENGINE_URL: http://feature-engine:5017
      SIGNAL_ENGINE_URL: http://signal-engine:5018
      JOURNAL_URL: http://journal:5009
      DATABASE_URL: postgres://${POSTGRES_USER:-veta}:${POSTGRES_PASSWORD:-veta}@postgres:5432/${POSTGRES_DB:-veta}
      REDPANDA_BROKERS: redpanda:9092
    volumes:
      - llm-advisory-data:/app/data
    labels:
      - "traefik.enable=false"

  # ── Gateway (BFF) ──────────────────────────────────────────────────────────
  gateway:
    <<: *deno-medium
    command: [
      "deno",
      "run",
      "--allow-all",
      "/app/backend/src/gateway/gateway.ts",
    ]
    depends_on:
      redpanda:
        condition: service_healthy
      journal:
        condition: service_healthy
      user-service:
        condition: service_healthy
      market-sim:
        condition: service_healthy
    environment:
      GATEWAY_PORT: "5011"
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: "5000"
      EMS_HOST: ems
      EMS_PORT: "5001"
      OMS_HOST: oms
      OMS_PORT: "5002"
      LIMIT_ALGO_HOST: limit-algo
      LIMIT_ALGO_PORT: "5003"
      TWAP_ALGO_HOST: twap-algo
      TWAP_ALGO_PORT: "5004"
      POV_ALGO_HOST: pov-algo
      POV_ALGO_PORT: "5005"
      VWAP_ALGO_HOST: vwap-algo
      VWAP_ALGO_PORT: "5006"
      OBSERVABILITY_HOST: observability
      OBSERVABILITY_PORT: "5007"
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: "5008"
      JOURNAL_HOST: journal
      JOURNAL_PORT: "5009"
      FIX_ARCHIVE_HOST: fix-archive
      FIX_ARCHIVE_PORT: "5012"
      NEWS_AGGREGATOR_HOST: news-aggregator
      NEWS_AGGREGATOR_PORT: "5013"
      ANALYTICS_HOST: analytics
      ANALYTICS_PORT: "5014"
      MARKET_DATA_HOST: market-data
      MARKET_DATA_PORT: "5015"
      FEATURE_ENGINE_HOST: feature-engine
      FEATURE_ENGINE_PORT: "5017"
      SIGNAL_ENGINE_HOST: signal-engine
      SIGNAL_ENGINE_PORT: "5018"
      RECOMMENDATION_ENGINE_HOST: recommendation-engine
      RECOMMENDATION_ENGINE_PORT: "5019"
      SCENARIO_ENGINE_HOST: scenario-engine
      SCENARIO_ENGINE_PORT: "5020"
      ICEBERG_ALGO_HOST: iceberg-algo
      ICEBERG_ALGO_PORT: "5021"
      SNIPER_ALGO_HOST: sniper-algo
      SNIPER_ALGO_PORT: "5022"
      ARRIVAL_PRICE_ALGO_HOST: arrival-price-algo
      ARRIVAL_PRICE_ALGO_PORT: "5023"
      LLM_ADVISORY_HOST: llm-advisory
      LLM_ADVISORY_PORT: "5024"
      MOMENTUM_ALGO_HOST: momentum-algo
      MOMENTUM_ALGO_PORT: "5025"
      IS_ALGO_HOST: is-algo
      IS_ALGO_PORT: "5026"
      DARK_POOL_HOST: dark-pool
      DARK_POOL_PORT: "5027"
      CCP_SERVICE_HOST: ccp-service
      CCP_SERVICE_PORT: "5028"
      RFQ_SERVICE_HOST: rfq-service
      RFQ_SERVICE_PORT: "5029"
      FIX_GATEWAY_HOST: fix-gateway
      FIX_GATEWAY_PORT: "9881"
      REDPANDA_BROKERS: redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5011/health || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 15
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=PathPrefix(`/api/gateway`)"
      - "traefik.http.routers.gateway.entrypoints=web,websecure"
      - "traefik.http.routers.gateway.middlewares=gateway-strip"
      - "traefik.http.middlewares.gateway-strip.stripprefix.prefixes=/api/gateway"
      - "traefik.http.services.gateway.loadbalancer.server.port=5011"
      - "traefik.http.routers.gateway.priority=20"
      - "traefik.http.routers.gateway-ws.rule=PathPrefix(`/ws/gateway`)"
      - "traefik.http.routers.gateway-ws.entrypoints=web,websecure"
      - "traefik.http.routers.gateway-ws.middlewares=gateway-ws-strip"
      - "traefik.http.middlewares.gateway-ws-strip.stripprefix.prefixes=/ws/gateway"
      - "traefik.http.routers.gateway-ws.service=gateway"
      - "traefik.http.routers.gateway-ws.priority=20"
      - "traefik.http.routers.health.rule=Path(`/health`)"
      - "traefik.http.routers.health.entrypoints=web,websecure"
      - "traefik.http.routers.health.service=gateway"
      - "traefik.http.routers.health.priority=25"

  # ── Disk Monitor ───────────────────────────────────────────────────────────
  disk-monitor:
    image: python:3.12-alpine
    container_name: veta-disk-monitor
    restart: unless-stopped
    command: python3 /scripts/disk-monitor.py
    networks:
      - trading-net
    volumes:
      - ./scripts/disk-monitor.py:/scripts/disk-monitor.py:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host:ro
    environment:
      WARN_PCT: "85"
      PRUNE_PCT: "90"
    ports:
      - "8099:8099"
    healthcheck:
      test: [
        "CMD-SHELL",
        "wget -qO- http://localhost:8099/ > /dev/null 2>&1 || exit 1",
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"
