      - "traefik.http.routers.twap-algo.rule=PathPrefix(`/api/twap-algo`)"
      - "traefik.http.routers.twap-algo.entrypoints=web,websecure"
      - "traefik.http.routers.twap-algo.middlewares=twap-algo-strip"
      - "traefik.http.middlewares.twap-algo-strip.stripprefix.prefixes=/api/twap-algo"
      - "traefik.http.services.twap-algo.loadbalancer.server.port=5004"
      - "traefik.http.routers.twap-algo.priority=10"

  pov-algo:
