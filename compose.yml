    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vwap-algo.rule=PathPrefix(`/api/vwap-algo`)"
      - "traefik.http.routers.vwap-algo.entrypoints=web,websecure"
      - "traefik.http.routers.vwap-algo.middlewares=vwap-algo-strip"
      - "traefik.http.middlewares.vwap-algo-strip.stripprefix.prefixes=/api/vwap-algo"
      - "traefik.http.services.vwap-algo.loadbalancer.server.port=5006"
