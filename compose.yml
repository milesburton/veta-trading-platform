      - "traefik.http.services.sniper-algo.loadbalancer.server.port=5022"
      - "traefik.http.routers.sniper-algo.priority=10"

  arrival-price-algo:
    <<: *deno-service
    profiles: [trading]
    command: [
      "deno",
      "run",
      "--allow-all",
