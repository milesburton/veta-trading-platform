# Traefik v3 static configuration
# Used across all environments: local Docker, homelab, Fly.io
# TLS is activated per-router via compose.prod.yml labels (certresolver=letsencrypt)
# Fly.io: TLS termination happens at the Fly edge; internal Traefik uses :80 only

api:
  dashboard: true
  insecure: true   # Dashboard on :8888 — restrict with auth middleware in prod if needed

ping: {}           # Used by homelab health checks

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: trading-net

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${ACME_EMAIL:-admin@example.com}"
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
    buckets:
      - 0.01
      - 0.05
      - 0.1
      - 0.25
      - 0.5
      - 1.0
      - 2.0

accessLog:
  format: json

log:
  level: INFO
  format: json
