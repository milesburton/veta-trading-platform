command=bash -c 'source /workspaces/virtual-equities-trading-application/.env 2>/dev/null; OTEL_SERVICE_NAME=market-sim deno run --allow-all /workspaces/virtual-equities-trading-application/backend/src/market-sim/market-sim.ts'
