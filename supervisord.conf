; Deno tcp-proxy permanently holds port 8080 and proxies to Vite on 5173.
; VSCode's port forwarding tunnel never sees 8080 go dark — even when
; Vite restarts, the proxy keeps the TCP listener bound and retries connections.
[program:frontend-proxy]
command=/home/deno/.deno/bin/deno run --allow-net /workspaces/virtual-equities-trading-application/scripts/tcp-proxy.ts 8080 5173
autostart=true
autorestart=true
priority=2
stdout_logfile=AUTO
stderr_logfile=AUTO

