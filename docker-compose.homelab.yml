    image: ghcr.io/milesburton/veta-trading-platform:latest
    container_name: veta-gateway
    command: deno run --allow-all backend/src/gateway/gateway.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
      market-sim:
        condition: service_healthy
      journal:
        condition: service_healthy
    environment:
      GATEWAY_PORT: 5011
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: 5000
      JOURNAL_HOST: journal
      JOURNAL_PORT: 5009
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: 5008
      EMS_HOST: ems
      EMS_PORT: 5001
      OMS_HOST: oms
      OMS_PORT: 5002
      ANALYTICS_HOST: analytics
      ANALYTICS_PORT: 5014
      MARKET_DATA_HOST: market-data
      MARKET_DATA_PORT: 5015
      FEATURE_ENGINE_HOST: feature-engine
      FEATURE_ENGINE_PORT: 5017
      SIGNAL_ENGINE_HOST: signal-engine
      SIGNAL_ENGINE_PORT: 5018
      RECOMMENDATION_ENGINE_HOST: recommendation-engine
      RECOMMENDATION_ENGINE_PORT: 5019
      SCENARIO_ENGINE_HOST: scenario-engine
      SCENARIO_ENGINE_PORT: 5020
      LLM_ADVISORY_HOST: llm-advisory
      LLM_ADVISORY_PORT: 5024
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-latest}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5011/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway-ws.rule=PathPrefix(`/ws/gateway`)"
      - "traefik.http.routers.gateway-ws.entrypoints=web"
      - "traefik.http.routers.gateway-ws.middlewares=gateway-ws-strip"
      - "traefik.http.middlewares.gateway-ws-strip.stripprefix.prefixes=/ws/gateway"
      - "traefik.http.routers.gateway-ws.service=gateway"
      - "traefik.http.routers.gateway-ws.priority=20"
      - "traefik.http.routers.gateway-api.rule=PathPrefix(`/api/gateway`)"
      - "traefik.http.routers.gateway-api.entrypoints=web"
      - "traefik.http.routers.gateway-api.middlewares=gateway-api-strip"
      - "traefik.http.middlewares.gateway-api-strip.stripprefix.prefixes=/api/gateway"
      - "traefik.http.routers.gateway-api.service=gateway"
      - "traefik.http.routers.gateway-api.priority=20"
      - "traefik.http.services.gateway.loadbalancer.server.port=5011"
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/milesburton/veta-trading-platform:latest
