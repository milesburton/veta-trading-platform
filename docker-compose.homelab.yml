    command: deno run --allow-all frontend-server.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      FRONTEND_PORT: 3000
      COMMIT_SHA: ${COMMIT_SHA:-latest}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`veta.home`) || PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Watchtower (auto-update VETA containers from GHCR) ───────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: veta-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/miles/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: 60
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"
