# VETA Trading Platform — Homelab deployment
# Image: ghcr.io/milesburton/veta-trading-platform:latest
# Built by CI on push to main, auto-updated by Watchtower.
#
# Setup:
#   sudo mkdir -p /opt/stacks/veta
#   sudo cp docker-compose.homelab.yml /opt/stacks/veta/compose.yml
#   sudo cp traefik.homelab.yml /opt/stacks/veta/traefik.yml
#   Add to /etc/hosts on clients: 192.168.1.245 veta.home
#   cd /opt/stacks/veta && docker compose pull && docker compose up -d

networks:
  trading-net:
    driver: bridge

volumes:
  postgres-data:
  opensearch-data:
  veta-data:

services:

  # ── Message Bus (Redpanda – Kafka-compatible) ─────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.3.6
    container_name: veta-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=2
      - --memory=512M
      - --default-log-level=warn
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
    networks:
      - trading-net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"

  # Redpanda Console (UI)
  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: veta-redpanda-console
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redpanda-console.rule=Host(`veta.home`) && PathPrefix(`/admin/redpanda`)"
      - "traefik.http.routers.redpanda-console.entrypoints=web"
      - "traefik.http.routers.redpanda-console.middlewares=redpanda-strip"
      - "traefik.http.middlewares.redpanda-strip.stripprefix.prefixes=/admin/redpanda"
      - "traefik.http.services.redpanda-console.loadbalancer.server.port=8080"
      - "traefik.http.routers.redpanda-console.priority=15"
      - "com.centurylinklabs.watchtower.enable=false"

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: veta-postgres
    restart: unless-stopped
    networks:
      - trading-net
    environment:
      POSTGRES_USER: veta
      POSTGRES_PASSWORD: veta
      POSTGRES_DB: veta
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "veta"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"

  # ── Postgres migrations (one-shot on startup) ─────────────────────────────────
  postgres-migrate:
    image: ghcr.io/milesburton/veta-trading-platform:latest
    command: deno run --allow-all backend/db/migrate.ts
    networks:
      - trading-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://veta:veta@postgres:5432/veta
    restart: "no"
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"

  # ── OpenSearch (single-node, security disabled) ──────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: veta-opensearch
    restart: unless-stopped
    networks:
      - trading-net
    environment:
      - cluster.name=trading-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - bootstrap.memory_lock=false
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"

  # ── OpenSearch Dashboards ─────────────────────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: veta-opensearch-dashboards
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
      - SERVER_BASEPATH=/admin/opensearch
      - SERVER_REWRITEBASEPATH=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/admin/opensearch/api/status | grep -qE '\"state\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.opensearch-dashboards.rule=Host(`veta.home`) && PathPrefix(`/admin/opensearch`)"
      - "traefik.http.routers.opensearch-dashboards.entrypoints=web"
      - "traefik.http.routers.opensearch-dashboards.priority=15"
      - "traefik.http.services.opensearch-dashboards.loadbalancer.server.port=5601"
      - "com.centurylinklabs.watchtower.enable=false"

  # ── Kafka Connect ───────────────────────────────────────────────────────────
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    container_name: veta-kafka-connect
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: redpanda:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: trading-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.converters.ByteArrayConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_ROOT_LOGLEVEL: WARN
      CONNECT_LOG4J_LOGGERS: "org.apache.kafka.connect.runtime.rest=WARN,org.reflections=ERROR"
    command:
      - bash
      - -c
      - |
        confluent-hub install --no-prompt opensearch-project/kafka-connect-opensearch:2.0.2
        /etc/confluent/docker/run
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"

  # ── OpenSearch Init ───────────────────────────────────────────────────────────
  opensearch-init:
    image: alpine/curl:latest
    container_name: veta-opensearch-init
    networks:
      - trading-net
    depends_on:
      opensearch:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    command: ["sh", "/scripts/opensearch-init.sh"]
    restart: "no"
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=false"

  # ── Ingress ──────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: veta-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "8888:8080"   # Traefik dashboard → http://veta.home:8888/dashboard/
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - trading-net
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=false"

  # ── Local LLM (Ollama) ──────────────────────────────────────────────────────
  ollama:
    image: ghcr.io/milesburton/veta-trading-platform:latest
    container_name: veta-ollama
    restart: unless-stopped
    entrypoint: ["ollama", "serve"]
    networks:
      - trading-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Market Simulation ─────────────────────────────────────────────────────
  market-sim:
    image: ghcr.io/milesburton/veta-trading-platform:latest
    container_name: veta-market-sim
    command: deno run --allow-all backend/src/market-sim/market-sim.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      MARKET_SIM_PORT: 5000
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-latest}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Execution Management System ──────────────────────────────────────────
  ems:
    image: ghcr.io/milesburton/veta-trading-platform:latest
    container_name: veta-ems
    command: deno run --allow-all backend/src/ems/ems-server.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      market-sim:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      EMS_PORT: 5001
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: 5000
      EMS_PARTICIPATION_CAP: ${EMS_PARTICIPATION_CAP:-0.20}
      EMS_IMPACT_PER_1000_BPS: ${EMS_IMPACT_PER_1000_BPS:-1.0}
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-latest}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Order Management System ──────────────────────────────────────────────
