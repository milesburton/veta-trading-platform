app = "veta-trading"
primary_region = "iad"

# Deployed as a single supervisord monolith via:
#   flyctl deploy --dockerfile Dockerfile.fly --remote-only

[build]
  dockerfile = "Dockerfile.fly"

[env]
  DATABASE_URL = "postgres://veta:veta@localhost:5432/veta"
  LLM_ENABLED = "false"

[vm]
  size = "performance-8x"

[deploy]
  strategy = "immediate"

# Gateway is the HTTP entry point — all traffic hits port 5011.
# Frontend static files served from gateway's / catch-all.
[http_service]
  internal_port = 5011
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "suspend"
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    timeout = "10s"
    type = "http"
    method = "GET"
    path = "/health"

# Note: for persistent volumes, provision with:
#   flyctl volumes create postgres_data --region iad --size 10
#   flyctl volumes create redpanda_data --region iad --size 10
# Then add [[mounts]] sections back.
