app = "veta-trading"
primary_region = "iad"

# Deployed via: flyctl deploy --compose compose.yml --compose compose.prod.yml
# Fly.io terminates TLS at the edge (force_https=true) before traffic reaches
# Traefik. Internal routing uses HTTP only — no ACME config needed inside the VM.

[vm]
  size = "performance-4x"   # 4 CPU, 8 GB RAM — needed for Redpanda + Ollama + ~47 services

[deploy]
  strategy = "immediate"

# Traefik is the only service that binds a public port.
# All other containers are on the internal trading-net and reached via Traefik labels.
[http_service]
  internal_port = 80
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "suspend"
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    timeout = "10s"
    type = "http"
    method = "GET"
    path = "/health"

# Persistent volumes — one per stateful service
# Provision with: flyctl volumes create <name> --region iad --size 10
[[mounts]]
  source = "postgres_data"
  destination = "/var/lib/postgresql/data"
  processes = ["postgres"]

[[mounts]]
  source = "redpanda_data"
  destination = "/var/lib/redpanda/data"
  processes = ["redpanda"]

[[mounts]]
  source = "llm_data"
  destination = "/root/.ollama"
  processes = ["ollama"]

[[mounts]]
  source = "market_data_state"
  destination = "/app/data"
  processes = ["market-data"]

[[mounts]]
  source = "feature_engine_data"
  destination = "/app/data"
  processes = ["feature-engine"]

[[mounts]]
  source = "signal_engine_data"
  destination = "/app/data"
  processes = ["signal-engine"]

[[mounts]]
  source = "llm_advisory_data"
  destination = "/app/data"
  processes = ["llm-advisory", "llm-worker"]
