# Fly.io configuration for VETA Trading Platform
# Deploy with: flyctl deploy
# Live: https://virtual-equities-trading.fly.dev/
# Note: app name is immutable after creation (determines DNS). To rename,
# create a new app with flyctl apps create and flyctl deploy --app <new-name>.

app = "virtual-equities-trading"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  args = { VITE_DEPLOYMENT = "fly" }

[env]
  MARKET_SIM_PORT = "5000"
  EMS_PORT = "5001"
  OMS_PORT = "5002"
  ALGO_TRADER_PORT = "5003"
  TWAP_ALGO_PORT = "5004"
  POV_ALGO_PORT = "5005"
  VWAP_ALGO_PORT = "5006"
  OBSERVABILITY_PORT = "5007"
  USER_SERVICE_PORT = "5008"
  JOURNAL_PORT = "5009"
  FIX_ARCHIVE_PORT = "5012"
  ANALYTICS_PORT = "5014"
  MARKET_DATA_PORT = "5015"
  MARKET_DATA_ADAPTERS_PORT = "5016"
  FEATURE_ENGINE_PORT = "5017"
  SIGNAL_ENGINE_PORT = "5018"
  RECOMMENDATION_ENGINE_PORT = "5019"
  SCENARIO_ENGINE_PORT = "5020"
  ICEBERG_ALGO_PORT = "5021"
  SNIPER_ALGO_PORT = "5022"
  ARRIVAL_PRICE_ALGO_PORT = "5023"
  LLM_ADVISORY_PORT = "5024"
  GATEWAY_PORT = "5011"
  FRONTEND_PORT = "3000"
  MARKET_SIM_HOST = "localhost"
  JOURNAL_HOST = "localhost"
  USER_SERVICE_HOST = "localhost"
  ANALYTICS_HOST = "localhost"
  MARKET_DATA_HOST = "localhost"
  FEATURE_ENGINE_HOST = "localhost"
  SIGNAL_ENGINE_HOST = "localhost"
  RECOMMENDATION_ENGINE_HOST = "localhost"
  SCENARIO_ENGINE_HOST = "localhost"
  LLM_ADVISORY_HOST = "localhost"
  LLM_ADVISORY_ENABLED = "false"
  LLM_PROVIDER = "mock"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    timeout = "10s"
    type = "http"
    method = "GET"
    path = "/health"

[mounts]
  source = "data"
  destination = "/app/backend/data"
  initial_size = "2gb"

[[vm]]
  memory = "4gb"
  cpus = 2
