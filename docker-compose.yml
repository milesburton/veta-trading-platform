networks:
  trading-net:
    driver: bridge

services:

  # ── Message Bus (Redpanda – Kafka-compatible) ─────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.3.6
    container_name: redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=200M
      - --default-log-level=warn
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
    networks:
      - trading-net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    labels:
      - "traefik.enable=false"

  # Redpanda Console (UI)
  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: redpanda-console
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redpanda-console.rule=PathPrefix(`/admin/redpanda`)"
      - "traefik.http.routers.redpanda-console.entrypoints=web"
      - "traefik.http.routers.redpanda-console.middlewares=redpanda-strip"
      - "traefik.http.middlewares.redpanda-strip.stripprefix.prefixes=/admin/redpanda"
      - "traefik.http.services.redpanda-console.loadbalancer.server.port=8080"
      - "traefik.http.routers.redpanda-console.priority=15"

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - trading-net
    environment:
      POSTGRES_USER: veta
      POSTGRES_PASSWORD: veta
      POSTGRES_DB: veta
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "veta"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    labels:
      - "traefik.enable=false"

  # ── Postgres migrations (one-shot on startup) ─────────────────────────────────
  postgres-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/db/migrate.ts
    networks:
      - trading-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://veta:veta@postgres:5432/veta
    restart: "no"
    labels:
      - "traefik.enable=false"

  # ── OpenSearch (single-node, security disabled for dev) ──────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch
    restart: unless-stopped
    networks:
      - trading-net
    environment:
      - cluster.name=trading-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    labels:
      - "traefik.enable=false"

  # ── OpenSearch Dashboards ─────────────────────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
      - SERVER_BASEPATH=/admin/opensearch
      - SERVER_REWRITEBASEPATH=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -qE '\"state\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.opensearch-dashboards.rule=PathPrefix(`/admin/opensearch`)"
      - "traefik.http.routers.opensearch-dashboards.entrypoints=web"
      - "traefik.http.routers.opensearch-dashboards.priority=15"
      - "traefik.http.services.opensearch-dashboards.loadbalancer.server.port=5601"

  # ── Kafka Connect (Confluent Community + OpenSearch Sink plugin) ───────────────
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    container_name: kafka-connect
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: redpanda:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: trading-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.converters.ByteArrayConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_ROOT_LOGLEVEL: WARN
      CONNECT_LOG4J_LOGGERS: "org.apache.kafka.connect.runtime.rest=WARN,org.reflections=ERROR"
    command:
      - bash
      - -c
      - |
        confluent-hub install --no-prompt opensearch-project/kafka-connect-opensearch:2.0.2
        /etc/confluent/docker/run
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s
    labels:
      - "traefik.enable=false"

  # ── OpenSearch Init (one-shot: index templates + connector registration) ───────
  opensearch-init:
    image: python:3.12-alpine
    container_name: opensearch-init
    networks:
      - trading-net
    depends_on:
      opensearch:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
      opensearch-dashboards:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    command: ["sh", "/scripts/opensearch-init.sh"]
    restart: "no"
    labels:
      - "traefik.enable=false"

  # ── Ingress ──────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"       # Public ingress
      - "8888:8080"   # Traefik dashboard → http://localhost:8888/dashboard/
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - trading-net
    labels:
      - "traefik.enable=true"

  # ── Local LLM (Ollama — model baked into image) ──────────────────────────────
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama
    restart: unless-stopped
    networks:
      - trading-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    labels:
      - "traefik.enable=false"

  # ── Market Simulation ────────────────────────────────────────────────────────
  market-sim:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/src/market-sim/market-sim.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      MARKET_SIM_PORT: 5000
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      # HTTP: /api/market-sim/* → strip prefix → service
      - "traefik.http.routers.market-sim.rule=PathPrefix(`/api/market-sim`)"
      - "traefik.http.routers.market-sim.entrypoints=web"
      - "traefik.http.routers.market-sim.middlewares=market-sim-strip"
      - "traefik.http.middlewares.market-sim-strip.stripprefix.prefixes=/api/market-sim"
      - "traefik.http.services.market-sim.loadbalancer.server.port=5000"
      # WebSocket: /ws/market-sim → service (no prefix strip — WS upgrade on root path)
      - "traefik.http.routers.market-sim-ws.rule=PathPrefix(`/ws/market-sim`)"
      - "traefik.http.routers.market-sim-ws.entrypoints=web"
      - "traefik.http.routers.market-sim-ws.middlewares=market-sim-ws-strip"
      - "traefik.http.middlewares.market-sim-ws-strip.stripprefix.prefixes=/ws/market-sim"
      - "traefik.http.routers.market-sim-ws.service=market-sim"

  # ── Execution Management System ──────────────────────────────────────────────
  ems:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/src/ems/ems-server.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      market-sim:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      EMS_PORT: 5001
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: 5000
      EMS_PARTICIPATION_CAP: ${EMS_PARTICIPATION_CAP:-0.20}
      EMS_IMPACT_PER_1000_BPS: ${EMS_IMPACT_PER_1000_BPS:-1.0}
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ems.rule=PathPrefix(`/api/ems`)"
      - "traefik.http.routers.ems.entrypoints=web"
      - "traefik.http.routers.ems.middlewares=ems-strip"
      - "traefik.http.middlewares.ems-strip.stripprefix.prefixes=/api/ems"
      - "traefik.http.services.ems.loadbalancer.server.port=5001"

  # ── Order Management System ──────────────────────────────────────────────────
  oms:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/src/oms/oms-server.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      ems:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      OMS_PORT: 5002
      ALGO_HOST: limit-algo   # default route; strategies are addressed individually
      ALGO_TRADER_PORT: 5003
      TWAP_ALGO_PORT: 5004
      POV_ALGO_PORT: 5005
      VWAP_ALGO_PORT: 5006
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oms.rule=PathPrefix(`/api/oms`)"
      - "traefik.http.routers.oms.entrypoints=web"
      - "traefik.http.routers.oms.middlewares=oms-strip"
      - "traefik.http.middlewares.oms-strip.stripprefix.prefixes=/api/oms"
      - "traefik.http.services.oms.loadbalancer.server.port=5002"

  # ── Limit Strategy ───────────────────────────────────────────────────────────
  limit-algo:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/src/algo/limit-strategy.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      ems:
        condition: service_healthy
      market-sim:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      ALGO_TRADER_PORT: 5003
      EMS_HOST: ems
      EMS_PORT: 5001
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: 5000
      OBSERVABILITY_HOST: observability
      OBSERVABILITY_PORT: 5007
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.limit-algo.rule=PathPrefix(`/api/limit`)"
      - "traefik.http.routers.limit-algo.entrypoints=web"
      - "traefik.http.routers.limit-algo.middlewares=limit-algo-strip"
      - "traefik.http.middlewares.limit-algo-strip.stripprefix.prefixes=/api/limit"
      - "traefik.http.services.limit-algo.loadbalancer.server.port=5003"

  # ── TWAP Strategy ────────────────────────────────────────────────────────────
  twap-algo:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/src/algo/twap-strategy.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      ems:
        condition: service_healthy
      market-sim:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      TWAP_ALGO_PORT: 5004
      EMS_HOST: ems
      EMS_PORT: 5001
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: 5000
      TWAP_INTERVAL_MS: ${TWAP_INTERVAL_MS:-5000}
      OBSERVABILITY_HOST: observability
      OBSERVABILITY_PORT: 5007
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.twap-algo.rule=PathPrefix(`/api/twap`)"
      - "traefik.http.routers.twap-algo.entrypoints=web"
      - "traefik.http.routers.twap-algo.middlewares=twap-algo-strip"
      - "traefik.http.middlewares.twap-algo-strip.stripprefix.prefixes=/api/twap"
      - "traefik.http.services.twap-algo.loadbalancer.server.port=5004"

  # ── POV Strategy ─────────────────────────────────────────────────────────────
  pov-algo:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/src/algo/pov-strategy.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      ems:
        condition: service_healthy
      market-sim:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      POV_ALGO_PORT: 5005
      EMS_HOST: ems
      EMS_PORT: 5001
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: 5000
      POV_PERCENTAGE: ${POV_PERCENTAGE:-10}
      POV_MIN_SLICE: ${POV_MIN_SLICE:-10}
      POV_MAX_SLICE: ${POV_MAX_SLICE:-5000}
      OBSERVABILITY_HOST: observability
      OBSERVABILITY_PORT: 5007
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5005/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pov-algo.rule=PathPrefix(`/api/pov`)"
      - "traefik.http.routers.pov-algo.entrypoints=web"
      - "traefik.http.routers.pov-algo.middlewares=pov-algo-strip"
      - "traefik.http.middlewares.pov-algo-strip.stripprefix.prefixes=/api/pov"
      - "traefik.http.services.pov-algo.loadbalancer.server.port=5005"

  # ── VWAP Strategy ────────────────────────────────────────────────────────────
  vwap-algo:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/src/algo/vwap-strategy.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      ems:
        condition: service_healthy
      market-sim:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      VWAP_ALGO_PORT: 5006
      EMS_HOST: ems
      EMS_PORT: 5001
      MARKET_SIM_HOST: market-sim
      MARKET_SIM_PORT: 5000
      VWAP_WINDOW_TICKS: ${VWAP_WINDOW_TICKS:-20}
      OBSERVABILITY_HOST: observability
      OBSERVABILITY_PORT: 5007
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vwap-algo.rule=PathPrefix(`/api/vwap`)"
      - "traefik.http.routers.vwap-algo.entrypoints=web"
      - "traefik.http.routers.vwap-algo.middlewares=vwap-algo-strip"
      - "traefik.http.middlewares.vwap-algo-strip.stripprefix.prefixes=/api/vwap"
      - "traefik.http.services.vwap-algo.loadbalancer.server.port=5006"

  # ── Observability ─────────────────────────────────────────────────────────────
  observability:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all observability/kafka-relay.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      OBSERVABILITY_PORT: 5007
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5007/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.observability.rule=PathPrefix(`/api/observability`)"
      - "traefik.http.routers.observability.entrypoints=web"
      - "traefik.http.routers.observability.middlewares=observability-strip"
      - "traefik.http.middlewares.observability-strip.stripprefix.prefixes=/api/observability"
      - "traefik.http.services.observability.loadbalancer.server.port=5007"
      # SSE requires buffering disabled
      - "traefik.http.middlewares.observability-sse.headers.customResponseHeaders.X-Accel-Buffering=no"

  # ── User Service ─────────────────────────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/src/user-service/user-service.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
    environment:
      USER_SERVICE_PORT: 5008
      DATABASE_URL: postgres://veta:veta@postgres:5432/veta
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5008/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user-service.rule=PathPrefix(`/api/user-service`)"
      - "traefik.http.routers.user-service.entrypoints=web"
      - "traefik.http.routers.user-service.middlewares=user-service-strip"
      - "traefik.http.middlewares.user-service-strip.stripprefix.prefixes=/api/user-service"
      - "traefik.http.services.user-service.loadbalancer.server.port=5008"

  # ── Journal Service ───────────────────────────────────────────────────────────
  journal:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/src/journal/journal-server.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
    environment:
      JOURNAL_PORT: 5009
      JOURNAL_RETENTION_DAYS: ${JOURNAL_RETENTION_DAYS:-90}
      DATABASE_URL: postgres://veta:veta@postgres:5432/veta
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5009/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.journal.rule=PathPrefix(`/api/journal`)"
      - "traefik.http.routers.journal.entrypoints=web"
      - "traefik.http.routers.journal.middlewares=journal-strip"
      - "traefik.http.middlewares.journal-strip.stripprefix.prefixes=/api/journal"
      - "traefik.http.services.journal.loadbalancer.server.port=5009"

  # ── FIX Archive (persists fix.execution events from bus) ─────────────────────
  fix-archive:
    build:
      context: .
      dockerfile: Dockerfile
    command: deno run --allow-all backend/src/fix/fix-archive.ts
    restart: unless-stopped
    networks:
      - trading-net
    depends_on:
      redpanda:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
    environment:
      FIX_ARCHIVE_PORT: 5012
      DATABASE_URL: postgres://veta:veta@postgres:5432/veta
      REDPANDA_BROKERS: redpanda:9092
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5012/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fix-archive.rule=PathPrefix(`/api/fix-archive`)"
      - "traefik.http.routers.fix-archive.entrypoints=web"
