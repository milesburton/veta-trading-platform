name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: false
        default: 'production'
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.x

      - name: Install backend dependencies
        run: deno install

      - name: Run backend tests
        run: deno task test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm run test:unit -- --run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Fly.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy old machine to clear stale volume attachments
        run: |
          MACHINES=$(flyctl machine list --app veta-trading --json 2>/dev/null || echo "[]")
          MACHINE_ID=$(echo "$MACHINES" | python3 -c "import sys,json; ms=json.load(sys.stdin); print(ms[0]['id']) if ms else print('')" 2>/dev/null || echo "")
          if [ -n "$MACHINE_ID" ]; then
            echo "Destroying old machine $MACHINE_ID to clear stale volume mounts..."
            flyctl machine destroy "$MACHINE_ID" --app veta-trading --force || true
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy monolith image to Fly.io
        run: |
          flyctl deploy \
            --dockerfile Dockerfile.fly \
            --remote-only \
            --build-arg VITE_COMMIT_SHA=$(git rev-parse --short HEAD) \
            --build-arg VITE_BUILD_DATE=$(date -u +%Y-%m-%d) \
            --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          EXPECTED=$(git rev-parse --short HEAD)
          echo "Expecting version: $EXPECTED"
          for i in $(seq 1 24); do
            DEPLOYED=$(curl -sf https://veta-trading.fly.dev/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || echo "")
            if [ "$DEPLOYED" = "$EXPECTED" ]; then
              echo "✅ Live version matches: $DEPLOYED"
              exit 0
            fi
            echo "  attempt $i/24: got '$DEPLOYED', retrying in 10s..."
            sleep 10
          done
          echo "❌ Stale deployment — expected $EXPECTED, got $DEPLOYED"
          exit 1

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    name: Smoke tests against Fly.io

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.x

      - name: Install backend dependencies
        run: deno install

      - name: Wait for /ready (all Tier-1 services up)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf https://veta-trading.fly.dev/api/gateway/ready | python3 -c "import sys,json; d=json.load(sys.stdin); print('ok' if d.get('ready') else 'wait')" 2>/dev/null || echo "wait")
            if [ "$STATUS" = "ok" ]; then
              echo "✅ /ready returned true"
              break
            fi
            echo "  attempt $i/30: not ready yet, retrying in 10s..."
            sleep 10
          done

      - name: Run smoke tests against Fly.io
        run: deno task test:smoke
        env:
          VETA_BASE_URL: https://veta-trading.fly.dev
