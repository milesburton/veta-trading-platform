name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: false
        default: 'production'
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.x

      - name: Install backend dependencies
        run: deno install

      - name: Run backend tests
        run: deno task test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm run test:unit -- --run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Fly.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure VM is performance-8x
        run: |
          MACHINES=$(flyctl machine list --app veta-trading --json)
          MACHINE_ID=$(echo "$MACHINES" | python3 -c "import sys,json; ms=json.load(sys.stdin); print(ms[0]['id']) if ms else exit(1)")
          CURRENT=$(echo "$MACHINES" | python3 -c "import sys,json; ms=json.load(sys.stdin); print(ms[0].get('config',{}).get('guest',{}).get('preset','unknown')) if ms else print('unknown')" 2>/dev/null || echo "unknown")
          echo "Current VM size: $CURRENT"
          if [ "$CURRENT" != "performance-8x" ]; then
            echo "Resizing to performance-8x..."
            flyctl machine update "$MACHINE_ID" --vm-size performance-8x --app veta-trading --yes
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Copy compose files to VM
        run: |
          flyctl ssh sftp put --app veta-trading compose.yml /root/compose.yml
          flyctl ssh sftp put --app veta-trading compose.prod.yml /root/compose.prod.yml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Pull latest images and restart services
        run: |
          flyctl ssh console --app veta-trading --command "cd /root && docker compose -f compose.yml -f compose.prod.yml pull --quiet && docker compose -f compose.yml -f compose.prod.yml up -d --remove-orphans"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          EXPECTED=$(git rev-parse --short HEAD)
          echo "Expecting version: $EXPECTED"
          for i in $(seq 1 24); do
            DEPLOYED=$(curl -sf https://veta-trading.fly.dev/api/gateway/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || echo "")
            if [ "$DEPLOYED" = "$EXPECTED" ]; then
              echo "✅ Live version matches: $DEPLOYED"
              exit 0
            fi
            echo "  attempt $i/24: got '$DEPLOYED', retrying in 10s..."
            sleep 10
          done
          echo "❌ Stale deployment — expected $EXPECTED, got $DEPLOYED"
          exit 1
