name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: false
        default: 'production'
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.x

      - name: Install backend dependencies
        run: deno install

      - name: Run backend tests
        run: deno task test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm run test:unit -- --run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Fly.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --compose compose.yml --compose compose.prod.yml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment — staleness check
        run: |
          EXPECTED=$(git rev-parse --short HEAD)
          echo "Expecting version: $EXPECTED"
          # Retry for up to 60s while the instance is booting
          for i in $(seq 1 12); do
            DEPLOYED=$(curl -sf https://veta-trading.fly.dev/api/gateway/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || echo "")
            if [ "$DEPLOYED" = "$EXPECTED" ]; then
              echo "✅ Live version matches: $DEPLOYED"
              exit 0
            fi
            echo "  attempt $i: got '$DEPLOYED', retrying in 5s..."
            sleep 5
          done
          echo "❌ Stale deployment — expected $EXPECTED but got $DEPLOYED"
          exit 1
