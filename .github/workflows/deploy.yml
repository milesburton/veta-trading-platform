name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: false
        default: 'production'
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.x

      - name: Install backend dependencies
        run: deno install

      - name: Run backend tests
        run: deno task test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm run test:unit -- --run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Fly.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy old machines and detach volumes
        run: |
          MACHINES=$(flyctl machine list --app veta-trading --json 2>/dev/null || echo "[]")
          MACHINE_IDS=$(echo "$MACHINES" | python3 -c "import sys,json; ms=json.load(sys.stdin); [print(m['id']) for m in ms]" 2>/dev/null || echo "")
          for MID in $MACHINE_IDS; do
            echo "Destroying machine $MID..."
            flyctl machine destroy "$MID" --app veta-trading --force || true
          done
          # Detach any existing volumes so deploy can proceed without [[mounts]]
          VOLS=$(flyctl volumes list --app veta-trading --json 2>/dev/null || echo "[]")
          VOL_IDS=$(echo "$VOLS" | python3 -c "import sys,json; vs=json.load(sys.stdin); [print(v['id']) for v in vs if not v.get('attached_machine_id')]" 2>/dev/null || echo "")
          for VID in $VOL_IDS; do
            echo "Volume $VID is unattached (OK)"
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy monolith image to Fly.io
        run: |
          flyctl deploy \
            --dockerfile Dockerfile.fly \
            --remote-only \
            --ha=false \
            --build-arg VITE_COMMIT_SHA=$(git rev-parse --short HEAD) \
            --build-arg VITE_BUILD_DATE=$(date -u +%Y-%m-%d) \
            --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          EXPECTED=$(git rev-parse --short HEAD)
          echo "Expecting version: $EXPECTED"
          for i in $(seq 1 24); do
            DEPLOYED=$(curl -sf https://veta-trading.fly.dev/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || echo "")
            if [ "$DEPLOYED" = "$EXPECTED" ]; then
              echo "✅ Live version matches: $DEPLOYED"
              exit 0
            fi
            echo "  attempt $i/24: got '$DEPLOYED', retrying in 10s..."
            sleep 10
          done
          echo "❌ Stale deployment — expected $EXPECTED, got $DEPLOYED"
          exit 1

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    name: Smoke tests against Fly.io

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.x

      - name: Install backend dependencies
        run: deno install

      - name: Wait for /ready (all Tier-1 services up)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf https://veta-trading.fly.dev/api/gateway/ready | python3 -c "import sys,json; d=json.load(sys.stdin); print('ok' if d.get('ready') else 'wait')" 2>/dev/null || echo "wait")
            if [ "$STATUS" = "ok" ]; then
              echo "✅ /ready returned true"
              break
            fi
            echo "  attempt $i/30: not ready yet, retrying in 10s..."
            sleep 10
          done

      - name: Wait for Kafka producer to connect (max 60s)
        run: |
          for i in $(seq 1 20); do
            READY_JSON=$(curl -sf https://veta-trading.fly.dev/api/gateway/ready 2>/dev/null || echo "{}")
            PRODUCER=$(echo "$READY_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('producerReady') else 'false')" 2>/dev/null || echo "false")
            echo "  attempt $i/20: producerReady=$PRODUCER"
            if [ "$PRODUCER" = "true" ]; then
              echo "✅ Kafka producer connected"
              break
            fi
            sleep 3
          done
          echo "ℹ️ Kafka producer status: $PRODUCER (smoke tests may use WS fallback for market data)"

      - name: Wait for all services to be ready
        run: |
          for svc in market-sim signal-engine feature-engine analytics limit-algo twap-algo pov-algo vwap-algo iceberg-algo sniper-algo arrival-price-algo momentum-algo is-algo dark-pool ccp-service rfq-service news-aggregator llm-advisory; do
            echo "Waiting for $svc..."
            for i in $(seq 1 30); do
              STATUS=$(curl -sf "https://veta-trading.fly.dev/api/$svc/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
              if [ "$STATUS" = "ok" ]; then
                echo "  ✅ $svc is ready"
                break
              fi
              echo "    attempt $i/30: $svc not ready, retrying in 5s..."
              sleep 5
            done
          done

      - name: Wait for auth to be ready (DB migration complete)
        run: |
          for i in $(seq 1 30); do
            CODE=$(curl -sf -X POST https://veta-trading.fly.dev/api/user-service/oauth/authorize \
              -H 'Content-Type: application/json' \
              -d '{"client_id":"veta-automation","username":"alice","password":"veta-dev-passcode","redirect_uri":"postmessage","response_type":"code","scope":"openid profile","code_challenge":"Az5MYuRvB8GvxBJen7MUERuvwcMQXfN8THdJE4ULky8","code_challenge_method":"S256"}' 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('code',''))" 2>/dev/null || true)
            if [ -n "$CODE" ]; then
              RESULT=$(curl -sf -X POST https://veta-trading.fly.dev/api/user-service/oauth/token \
                -H 'Content-Type: application/json' \
                -d "{\"client_id\":\"veta-automation\",\"code\":\"$CODE\",\"grant_type\":\"authorization_code\",\"redirect_uri\":\"postmessage\",\"code_verifier\":\"veta-smoke-challenge\"}" \
                -c /tmp/smoke-cookies.txt 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print('ok' if 'user' in d else 'fail')" 2>/dev/null || echo "fail")
            else
              RESULT="fail"
            fi
            if [ "$RESULT" = "ok" ]; then
              COOKIE=$(grep veta_user /tmp/smoke-cookies.txt | awk '{print $7}')
              GW=$(curl -sf https://veta-trading.fly.dev/api/gateway/me -H "Cookie: veta_user=$COOKIE" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print('ok' if 'user' in d else 'fail')" 2>/dev/null || echo "fail")
              if [ "$GW" = "ok" ]; then
                echo "✅ Auth pipeline working (user-service + gateway)"
                break
              fi
            fi
            echo "  attempt $i/30: auth not ready yet, retrying in 5s..."
            sleep 5
          done

      - name: Run smoke tests against Fly.io
        run: deno task test:smoke
        env:
          VETA_BASE_URL: https://veta-trading.fly.dev
