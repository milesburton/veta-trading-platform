name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    name: Lint, type-check, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.x

      - name: Install backend dependencies
        run: deno install

      - name: Lint
        run: deno task lint

      - name: Type check
        run: deno task check

      - name: Unit tests
        run: deno task test

  frontend:
    name: Frontend lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.npm
          key: npm-${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-frontend-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Biome lint
        working-directory: frontend
        run: npx @biomejs/biome check src/

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vitest unit tests
        working-directory: frontend
        run: npm run test:unit -- --run

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veta
          POSTGRES_PASSWORD: veta
          POSTGRES_DB: veta
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.x

      - name: Install backend dependencies
        run: deno install

      - name: Start Redpanda
        run: |
          docker run -d --name redpanda \
            -p 9092:9092 \
            redpandadata/redpanda:v24.3.6 \
            redpanda start \
            --mode=dev-container \
            --smp=1 \
            --memory=200M \
            --default-log-level=warn \
            --kafka-addr=0.0.0.0:9092 \
            --advertise-kafka-addr=localhost:9092
          for i in $(seq 1 30); do
            docker exec redpanda rpk cluster health 2>/dev/null && echo "Redpanda ready" && break || sleep 2
            echo "Waiting for Redpanda ($i/30)..."
          done

      - name: Run database migrations
        run: deno run --allow-all backend/db/migrate.ts
        env:
          DATABASE_URL: postgres://veta:veta@localhost:5432/veta

      - name: Start backend services
        env:
          DATABASE_URL: postgres://veta:veta@localhost:5432/veta
        run: |
          SHA=$(git rev-parse --short HEAD)
          COMMIT_SHA=$SHA MARKET_SIM_PORT=5000 deno run --allow-all backend/src/market-sim/market-sim.ts &
          COMMIT_SHA=$SHA EMS_PORT=5001 deno run --allow-all backend/src/ems/ems-server.ts &
          COMMIT_SHA=$SHA OMS_PORT=5002 ALGO_TRADER_PORT=5003 TWAP_ALGO_PORT=5004 POV_ALGO_PORT=5005 VWAP_ALGO_PORT=5006 ICEBERG_ALGO_PORT=5021 SNIPER_ALGO_PORT=5022 ARRIVAL_PRICE_ALGO_PORT=5023 MOMENTUM_ALGO_PORT=5025 IS_ALGO_PORT=5026 deno run --allow-all backend/src/oms/oms-server.ts &
          COMMIT_SHA=$SHA ALGO_TRADER_PORT=5003 deno run --allow-all backend/src/algo/limit-strategy.ts &
          COMMIT_SHA=$SHA TWAP_ALGO_PORT=5004 deno run --allow-all backend/src/algo/twap-strategy.ts &
          COMMIT_SHA=$SHA POV_ALGO_PORT=5005 deno run --allow-all backend/src/algo/pov-strategy.ts &
          COMMIT_SHA=$SHA VWAP_ALGO_PORT=5006 deno run --allow-all backend/src/algo/vwap-strategy.ts &
          COMMIT_SHA=$SHA ICEBERG_ALGO_PORT=5021 deno run --allow-all backend/src/algo/iceberg-strategy.ts &
          COMMIT_SHA=$SHA SNIPER_ALGO_PORT=5022 deno run --allow-all backend/src/algo/sniper-strategy.ts &
          COMMIT_SHA=$SHA ARRIVAL_PRICE_ALGO_PORT=5023 deno run --allow-all backend/src/algo/arrival-price-strategy.ts &
          COMMIT_SHA=$SHA JOURNAL_PORT=5009 deno run --allow-all backend/src/journal/journal-server.ts &
          COMMIT_SHA=$SHA OBSERVABILITY_PORT=5007 deno run --allow-all observability/kafka-relay.ts &
          COMMIT_SHA=$SHA USER_SERVICE_PORT=5008 deno run --allow-all backend/src/user-service/user-service.ts &
          COMMIT_SHA=$SHA FIX_ARCHIVE_PORT=5012 deno run --allow-all backend/src/fix/fix-archive.ts &
          COMMIT_SHA=$SHA deno run --allow-all backend/src/news/news-aggregator.ts &
          COMMIT_SHA=$SHA ANALYTICS_PORT=5014 deno run --allow-all backend/src/analytics/analytics-server.ts &
          COMMIT_SHA=$SHA MARKET_DATA_PORT=5015 deno run --allow-all backend/src/market-data/market-data-service.ts &
          COMMIT_SHA=$SHA MARKET_DATA_ADAPTERS_PORT=5016 deno run --allow-all backend/src/market-data-adapters/adapter-server.ts &
          COMMIT_SHA=$SHA FEATURE_ENGINE_PORT=5017 deno run --allow-all backend/src/feature-engine/feature-engine.ts &
          COMMIT_SHA=$SHA SIGNAL_ENGINE_PORT=5018 deno run --allow-all backend/src/signal-engine/signal-engine.ts &
          COMMIT_SHA=$SHA RECOMMENDATION_ENGINE_PORT=5019 deno run --allow-all backend/src/recommendation-engine/recommendation-server.ts &
          COMMIT_SHA=$SHA SCENARIO_ENGINE_PORT=5020 deno run --allow-all backend/src/scenario-engine/scenario-server.ts &
          COMMIT_SHA=$SHA LLM_ADVISORY_PORT=5024 LLM_ENABLED=false deno run --allow-all backend/src/llm-advisory/orchestrator.ts &
          COMMIT_SHA=$SHA MOMENTUM_ALGO_PORT=5025 deno run --allow-all backend/src/algo/momentum-strategy.ts &
          COMMIT_SHA=$SHA IS_ALGO_PORT=5026 deno run --allow-all backend/src/algo/is-strategy.ts &
          COMMIT_SHA=$SHA DARK_POOL_PORT=5027 deno run --allow-all backend/src/dark-pool/dark-pool-server.ts &
          COMMIT_SHA=$SHA CCP_SERVICE_PORT=5028 deno run --allow-all backend/src/ccp/ccp-service.ts &
          COMMIT_SHA=$SHA RFQ_SERVICE_PORT=5029 deno run --allow-all backend/src/rfq/rfq-service.ts &
          COMMIT_SHA=$SHA GATEWAY_PORT=5011 JOURNAL_HOST=localhost JOURNAL_PORT=5009 USER_SERVICE_HOST=localhost USER_SERVICE_PORT=5008 DARK_POOL_HOST=localhost DARK_POOL_PORT=5027 CCP_SERVICE_HOST=localhost CCP_SERVICE_PORT=5028 RFQ_SERVICE_HOST=localhost RFQ_SERVICE_PORT=5029 deno run --allow-all backend/src/gateway/gateway.ts &

      - name: Wait for services to be ready
        run: |
          for port in 5000 5001 5002 5003 5004 5005 5006 5007 5008 5009 5011 5012 5014 5015 5016 5017 5018 5019 5020 5021 5022 5023 5024 5025 5026 5027 5028 5029; do
            for i in $(seq 1 30); do
              curl -sf http://localhost:$port/health && break || sleep 1
            done
          done

      - name: Wait for market data (EMS needs prices before integration tests)
        run: |
          for i in $(seq 1 30); do
            PRICE=$(curl -sf http://localhost:5000/assets | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['price'] if data else 0)" 2>/dev/null || echo 0)
            if [ "$PRICE" != "0" ] && [ -n "$PRICE" ]; then
              echo "Market data ready: AAPL price=$PRICE"
              break
            fi
            echo "Waiting for market tick ($i/30)..."
            sleep 2
          done

      - name: Wait for Kafka consumers to subscribe
        run: |
          echo "Allowing 20s for all algo Kafka consumers to subscribe to their topics..."
          sleep 20

      - name: Integration tests (service contracts + order flow)
        run: deno test --allow-all backend/src/tests/integration.test.ts
        env:
          DATABASE_URL: postgres://veta:veta@localhost:5432/veta

      - name: Integration tests (algo strategies)
        run: deno test --allow-all backend/src/tests/algo.integration.test.ts
        env:
          DATABASE_URL: postgres://veta:veta@localhost:5432/veta

      - name: Integration tests (intelligence pipeline)
        run: deno test --allow-all backend/src/tests/intelligence.integration.test.ts
        env:
          DATABASE_URL: postgres://veta:veta@localhost:5432/veta

      - name: Integration tests (journal HTTP contracts)
        run: deno test --allow-all backend/src/tests/journal.http.test.ts
        env:
          DATABASE_URL: postgres://veta:veta@localhost:5432/veta

      - name: Integration tests (market-data-service HTTP contracts)
        run: deno test --allow-all backend/src/tests/market-data.http.test.ts
        env:
          DATABASE_URL: postgres://veta:veta@localhost:5432/veta

      - name: Smoke tests (all service health + contracts)
        run: deno task test:smoke
        env:
          DATABASE_URL: postgres://veta:veta@localhost:5432/veta

  playwright-ui:
    name: Playwright UI tests
    runs-on: ubuntu-latest
    needs: [frontend, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache npm and Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.npm
            ~/.cache/ms-playwright
          key: npm-playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: |
            npm-playwright-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Playwright UI tests (headless)
        working-directory: frontend
        run: npx playwright test --reporter=list
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  screenshots:
    name: Capture UI screenshots
    runs-on: ubuntu-latest
    needs: [frontend, integration]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache npm and Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.npm
            ~/.cache/ms-playwright
          key: npm-playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: |
            npm-playwright-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Capture screenshots
        working-directory: frontend
        run: npx playwright test tests/screenshots.spec.ts --reporter=list
        env:
          CI: true

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --staged --quiet; then
            echo "No screenshot changes"
          else
            git commit -m "chore(screenshots): update UI screenshots [skip ci]"
            git push
          fi

  electron:
    name: Electron build & E2E tests
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.npm
          key: npm-${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-frontend-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install xvfb and Electron native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libgtk-3-0 libnotify-dev libnss3 libxss1 libasound2 libxtst6 xauth libgbm-dev

      - name: Install Playwright for Electron tests
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build Electron app
        working-directory: frontend
        run: npm run electron:build
        env:
          ELECTRON_BUILD: "1"

      - name: Run Electron E2E tests (headless via xvfb)
        working-directory: frontend
        run: xvfb-run --auto-servernum npm run test:electron
        env:
          CI: true

      - name: Upload Electron test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-test-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  docker-base:
    name: Build base image
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend, integration, playwright-ui]
    permissions:
      contents: read
      packages: write
    outputs:
      base-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/milesburton/veta-trading-platform/base
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [docker-base]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            file: docker/frontend/Dockerfile
          - service: market-sim
            file: docker/market-sim/Dockerfile
          - service: ems
            file: docker/ems/Dockerfile
          - service: oms
            file: docker/oms/Dockerfile
          - service: limit-algo
            file: docker/limit-algo/Dockerfile
          - service: twap-algo
            file: docker/twap-algo/Dockerfile
          - service: pov-algo
            file: docker/pov-algo/Dockerfile
          - service: vwap-algo
            file: docker/vwap-algo/Dockerfile
          - service: iceberg-algo
            file: docker/iceberg-algo/Dockerfile
          - service: sniper-algo
            file: docker/sniper-algo/Dockerfile
          - service: arrival-price-algo
            file: docker/arrival-price-algo/Dockerfile
          - service: momentum-algo
            file: docker/momentum-algo/Dockerfile
          - service: is-algo
            file: docker/is-algo/Dockerfile
          - service: observability
            file: docker/observability/Dockerfile
          - service: user-service
            file: docker/user-service/Dockerfile
          - service: journal
            file: docker/journal/Dockerfile
          - service: fix-exchange
            file: docker/fix-exchange/Dockerfile
          - service: fix-gateway
            file: docker/fix-gateway/Dockerfile
          - service: fix-archive
            file: docker/fix-archive/Dockerfile
          - service: analytics
            file: docker/analytics/Dockerfile
          - service: market-data
            file: docker/market-data/Dockerfile
          - service: market-data-adapters
            file: docker/market-data-adapters/Dockerfile
          - service: feature-engine
            file: docker/feature-engine/Dockerfile
          - service: signal-engine
            file: docker/signal-engine/Dockerfile
          - service: recommendation-engine
            file: docker/recommendation-engine/Dockerfile
          - service: scenario-engine
            file: docker/scenario-engine/Dockerfile
          - service: llm-advisory
            file: docker/llm-advisory/Dockerfile
          - service: llm-worker
            file: docker/llm-worker/Dockerfile
          - service: news-aggregator
            file: docker/news-aggregator/Dockerfile
          - service: gateway
            file: docker/gateway/Dockerfile
          - service: dark-pool
            file: docker/dark-pool/Dockerfile
          - service: ccp-service
            file: docker/ccp-service/Dockerfile
          - service: rfq-service
            file: docker/rfq-service/Dockerfile
          - service: db-migrate
            file: docker/db-migrate/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/milesburton/veta-trading-platform/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BASE_TAG=${{ needs.docker-base.outputs.base-tag }}
            COMMIT_SHA=${{ github.sha }}
            VITE_DEPLOYMENT=homelab
            VITE_COMMIT_SHA=${{ github.sha }}
            VITE_BUILD_DATE=${{ github.run_started_at }}
          cache-from: type=registry,ref=ghcr.io/milesburton/veta-trading-platform/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=ghcr.io/milesburton/veta-trading-platform/${{ matrix.service }}:buildcache,mode=max
