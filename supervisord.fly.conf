[unix_http_server]
file=/tmp/supervisor.sock

[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

; ── Infrastructure (highest priority, always-on) ──────────────────────────────

[program:postgres]
command=bash -c '
  PG_VER=$(ls /usr/lib/postgresql)
  DATA=/var/lib/postgresql/data
  mkdir -p "$DATA" /var/run/postgresql && chown -R postgres:postgres "$DATA" /var/run/postgresql
  if [ ! -f "$DATA/PG_VERSION" ]; then
    echo "[postgres] Initialising data directory at $DATA"
    su postgres -c "/usr/lib/postgresql/$PG_VER/bin/initdb -D $DATA"
    echo "listen_addresses = '"'"'localhost'"'"'" >> $DATA/postgresql.conf
    su postgres -c "/usr/lib/postgresql/$PG_VER/bin/pg_ctl start -D $DATA -w"
    su postgres -c "psql -c \"CREATE USER veta WITH PASSWORD '"'"'veta'"'"';\""
    su postgres -c "psql -c \"CREATE DATABASE veta OWNER veta;\""
    su postgres -c "/usr/lib/postgresql/$PG_VER/bin/pg_ctl stop -D $DATA"
  fi
  exec su postgres -c "/usr/lib/postgresql/$PG_VER/bin/postgres -D $DATA"'
autostart=true
autorestart=true
priority=1
startsecs=5
stdout_logfile=/var/log/supervisor/postgres.log
stderr_logfile=/var/log/supervisor/postgres.log

[program:redpanda]
command=bash -c 'mkdir -p /var/lib/redpanda/data /etc/redpanda /root/redpanda-wrapper/bin /root/redpanda-wrapper/etc/redpanda && printf "#!/bin/bash\nif [ \"$1\" = \"redpanda\" ]; then shift; fi\nexec /usr/local/lib/redpanda/ld.so --library-path /usr/local/lib/redpanda /usr/local/bin/redpanda \"$@\"\n" > /root/redpanda-wrapper/bin/redpanda && chmod +x /root/redpanda-wrapper/bin/redpanda && /usr/local/bin/rpk redpanda start --install-dir /root/redpanda-wrapper --mode=dev-container --smp=1 --memory=512M --default-log-level=warn --kafka-addr=0.0.0.0:9092 --advertise-kafka-addr=localhost:9092 --advertise-rpc-addr=localhost:33145'
autostart=true
autorestart=true
priority=2
startsecs=10
stdout_logfile=/var/log/supervisor/redpanda.log
stderr_logfile=/var/log/supervisor/redpanda.log

[program:redpanda-check]
command=bash -c 'rm -f /tmp/redpanda-ready; for i in $(seq 1 60); do /usr/local/bin/rpk cluster info --brokers localhost:9092 >/dev/null 2>&1 && touch /tmp/redpanda-ready && exit 0; sleep 3; done; echo "[redpanda-check] timed out waiting for Redpanda"; exit 1'
autostart=true
autorestart=false
priority=3
startsecs=0
exitcodes=0
stdout_logfile=/var/log/supervisor/redpanda-check.log
stderr_logfile=/var/log/supervisor/redpanda-check.log

[program:db-migrate]
command=bash -c 'rm -f /tmp/migration-done; until psql -U veta -d veta -c "SELECT 1" -q 2>/dev/null; do sleep 2; done; cd /app && deno run --allow-all backend/db/migrate.ts && touch /tmp/migration-done'
directory=/app
environment=DATABASE_URL="postgres://veta:veta@localhost:5432/veta"
autostart=true
autorestart=false
priority=3
startsecs=0
exitcodes=0
stdout_logfile=/var/log/supervisor/db-migrate.log
stderr_logfile=/var/log/supervisor/db-migrate.log

